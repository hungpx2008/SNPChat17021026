# ==========================================================================
# 🔁 SHARED ENV VARS & DEPENDS (YAML Anchors — DRY)
# ==========================================================================
x-common-env: &common-env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-chatsnp}:${POSTGRES_PASSWORD:-12345678}@postgres:5432/${POSTGRES_DB:-chatsnp}
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/0
  QDRANT_URL: http://qdrant:6333
  QDRANT_HOST: qdrant
  QDRANT_PORT: 6333
  QDRANT_COLLECTION: mem0_memories
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-AITeamVN/Vietnamese_Embedding_v2}
  EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}
  BACKEND_INTERNAL_URL: http://backend:8000
  PYTHONUNBUFFERED: "1"
  # Whoosh BM25 index directory (Hybrid Search)
  WHOOSH_INDEX_DIR: /data/whoosh_index
  # AI Keys
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://ezaiapi.com}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  OPENROUTER_API_BASE: ${OPENROUTER_API_BASE:-https://ezaiapi.com}
  # AI Model Configuration
  LLM_MODEL: ${LLM_MODEL:-claude-opus-4-6}
  LLM_MODEL_LIGHT: ${LLM_MODEL_LIGHT:-gpt-5.3-codex}
  LLM_FALLBACK_ENABLED: ${LLM_FALLBACK_ENABLED:-false}
  LLM_FALLBACK_API_KEY: ${LLM_FALLBACK_API_KEY:-}
  LLM_FALLBACK_BASE_URL: ${LLM_FALLBACK_BASE_URL:-https://openrouter.ai/api/v1}
  LLM_FALLBACK_MODEL: ${LLM_FALLBACK_MODEL:-openai/gpt-5-mini}
  # Docling chunking & table serializer tuning
  # Model: AITeamVN/Vietnamese_Embedding_v2 (BAAI/bge-m3 base, max_seq=2048)
  # 2048 = parent chunk size for 2-tier parent-child retrieval (Phase 6)
  DOCLING_CHUNK_MAX_TOKENS: ${DOCLING_CHUNK_MAX_TOKENS:-768}
  DOCLING_CHUNK_MERGE_PEERS: ${DOCLING_CHUNK_MERGE_PEERS:-true}
  DOCLING_TABLE_MARKDOWN_MAX_COLS: ${DOCLING_TABLE_MARKDOWN_MAX_COLS:-4}
  DOCLING_TABLE_MARKDOWN_MAX_CELLS: ${DOCLING_TABLE_MARKDOWN_MAX_CELLS:-36}
  DOCLING_TABLE_GROUP_KEY_HINTS: ${DOCLING_TABLE_GROUP_KEY_HINTS:-type,category,item,service,description,name,code,id,loai,muc,dich vu}
  DOCLING_TABLE_NORMALIZE_VALUES: ${DOCLING_TABLE_NORMALIZE_VALUES:-true}
  DOCLING_PREFIX_HEADING_ROWKEY: ${DOCLING_PREFIX_HEADING_ROWKEY:-true}
  DOCLING_GROUP_LOCK_ENABLED: ${DOCLING_GROUP_LOCK_ENABLED:-true}
  DOCLING_GROUP_LOCK_MAX_CHARS: ${DOCLING_GROUP_LOCK_MAX_CHARS:-2800}
  # Docling VLM (tắt mặc định: tránh gọi OpenRouter 10-60s/ảnh tuần tự)
  DOCLING_VLM_ENABLED: ${DOCLING_VLM_ENABLED:-false}
  DOCLING_VLM_MIN_SIZE: ${DOCLING_VLM_MIN_SIZE:-300}
  DOCLING_VLM_MAX_IMAGES: ${DOCLING_VLM_MAX_IMAGES:-10}
  DOCLING_VLM_PROMPT: ${DOCLING_VLM_PROMPT:-}
  # PaddleOCR for scanned documents (Phase 9)
  ENABLE_PADDLE_OCR: ${ENABLE_PADDLE_OCR:-false}

services:
  # ==========================================================================
  # 📦 DATA LAYER
  # ==========================================================================
  postgres:
    image: postgres:16
    container_name: chatsnp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatsnp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-12345678}
      POSTGRES_DB: ${POSTGRES_DB:-chatsnp}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatsnp}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    container_name: chatsnp-redis
    restart: unless-stopped
    command: [ "redis-server", "--save", "60", "1" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: chatsnp-qdrant
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' 2>/dev/null && echo ok || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${QDRANT_PORT_HTTP:-6333}:6333"
      - "${QDRANT_PORT_GRPC:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  # ==========================================================================
  # 🚀 APPLICATION
  # ==========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatsnp-backend
    restart: unless-stopped
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 1
    volumes:
      - ./backend:/app
      - media-data:/app/media
      - whoosh-index:/data/whoosh_index
    environment:
      <<: *common-env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8000}
    container_name: chatsnp-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
      BACKEND_INTERNAL_URL: http://backend:8000
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://ezaiapi.com}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-gpt-5.3-codex}
      LLM_FALLBACK_ENABLED: ${LLM_FALLBACK_ENABLED:-false}
      LLM_FALLBACK_API_KEY: ${LLM_FALLBACK_API_KEY:-}
      LLM_FALLBACK_BASE_URL: ${LLM_FALLBACK_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_FALLBACK_MODEL: ${LLM_FALLBACK_MODEL:-openai/gpt-5-mini}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ==========================================================================
  # ⚙️ CELERY WORKERS — 1 Image, 3 Containers
  # ==========================================================================
  worker_chat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatsnp-worker-chat
    restart: unless-stopped
    command: celery -A src.worker.celery_app worker -Q chat_priority -c 2 --loglevel=info -n chat@%h
    volumes:
      - ./backend:/app
      - whoosh-index:/data/whoosh_index
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  worker_data:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatsnp-worker-data
    restart: unless-stopped
    command: celery -A src.worker.celery_app worker -Q data_batch -c 2 --loglevel=info -n data@%h
    volumes:
      - ./backend:/app
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  worker_media:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatsnp-worker-media
    restart: unless-stopped
    command: celery -A src.worker.celery_app worker -Q media_process -c 1 --loglevel=info -n media@%h --soft-time-limit=300 --time-limit=600 --max-tasks-per-child=50
    volumes:
      - ./backend:/app
      - media-data:/app/media
      - whoosh-index:/data/whoosh_index
      - paddle-models:/root/.paddleocr
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # ==========================================================================
  # 📊 MONITORING
  # ==========================================================================
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatsnp-flower
    restart: unless-stopped
    command: celery -A src.worker.celery_app flower --port=5555 --broker_api=redis://redis:6379/0
    ports:
      - "5555:5555"
    volumes:
      - ./backend:/app
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: chatsnp_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token eyJhIjoiNjRiZTNhY2RiNWEyNGQ3ZTU3NDYyZWU3MmE0M2YxYzEiLCJ0IjoiODRhYWZhZTktMDFlMC00MWE0LThiODYtZDg3NDY4NWRmOTVmIiwicyI6IlpHWTRZMlV5TkRndFptVXlPQzAwT1dGbExXRTVPR0V0T1RjeU5qUTRNamcwTldaayJ9
    networks:
      - default

# ==========================================================================
# 💾 VOLUMES
# ==========================================================================
volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  media-data:
  whoosh-index:
  paddle-models:
