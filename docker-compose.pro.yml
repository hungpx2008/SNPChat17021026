services:
  # ==========================================================================
  # 📦 DATA LAYER
  # ==========================================================================
  postgres:
    image: postgres:16
    container_name: chatsnp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatsnp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-12345678}
      POSTGRES_DB: ${POSTGRES_DB:-chatsnp}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    container_name: chatsnp-redis
    restart: unless-stopped
    command: [ "redis-server", "--save", "60", "1" ]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: chatsnp-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT_HTTP:-6333}:6333"
      - "${QDRANT_PORT_GRPC:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  # ==========================================================================
  # 🚀 APPLICATION
  # ==========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatsnp-backend
    restart: unless-stopped
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 1
    volumes:
      - media-data:/app/media # Shared với workers
      - whoosh-index:/data/whoosh_index
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-chatsnp}:${POSTGRES_PASSWORD:-12345678}@postgres:5432/${POSTGRES_DB:-chatsnp}
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: mem0_memories
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-384}
      CELERY_BROKER_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: "1"
      # AI Keys (Loaded from .env by docker-compose interpolation)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://ezaiapi.com}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_API_BASE: ${OPENROUTER_API_BASE:-https://ezaiapi.com}
      LLM_FALLBACK_ENABLED: ${LLM_FALLBACK_ENABLED:-false}
      LLM_FALLBACK_API_KEY: ${LLM_FALLBACK_API_KEY:-}
      LLM_FALLBACK_BASE_URL: ${LLM_FALLBACK_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_FALLBACK_MODEL: ${LLM_FALLBACK_MODEL:-openai/gpt-5-mini}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - qdrant
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-https://backendchatsnp.cntt-snp.online}
    container_name: chatsnp-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_BACKEND_URL: https://backendchatsnp.cntt-snp.online
      BACKEND_INTERNAL_URL: http://backend:8000
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://ezaiapi.com}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-gpt-5.3-codex}
      LLM_FALLBACK_ENABLED: ${LLM_FALLBACK_ENABLED:-false}
      LLM_FALLBACK_API_KEY: ${LLM_FALLBACK_API_KEY:-}
      LLM_FALLBACK_BASE_URL: ${LLM_FALLBACK_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_FALLBACK_MODEL: ${LLM_FALLBACK_MODEL:-openai/gpt-5-mini}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ==========================================================================
  # ⚙️ CELERY WORKERS — 1 Image, 3 Containers
  # ==========================================================================
  worker_chat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatsnp-worker-chat
    restart: unless-stopped
    command: celery -A src.worker.celery_app worker -Q chat_priority -c 2 --loglevel=info -n chat@%h
    volumes:
      - whoosh-index:/data/whoosh_index
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-chatsnp}:${POSTGRES_PASSWORD:-12345678}@postgres:5432/${POSTGRES_DB:-chatsnp}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-384}
      BACKEND_INTERNAL_URL: http://backend:8000
      PYTHONUNBUFFERED: "1"
      # AI Keys for RAG
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://ezaiapi.com}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      LLM_FALLBACK_ENABLED: ${LLM_FALLBACK_ENABLED:-false}
      LLM_FALLBACK_API_KEY: ${LLM_FALLBACK_API_KEY:-}
      LLM_FALLBACK_BASE_URL: ${LLM_FALLBACK_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_FALLBACK_MODEL: ${LLM_FALLBACK_MODEL:-openai/gpt-5-mini}
    depends_on:
      - redis
      - postgres
      - qdrant

  worker_data:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatsnp-worker-data
    restart: unless-stopped
    command: celery -A src.worker.celery_app worker -Q data_batch -c 2 --loglevel=info -n data@%h
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-chatsnp}:${POSTGRES_PASSWORD:-12345678}@postgres:5432/${POSTGRES_DB:-chatsnp}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: "1"
      # AI Keys
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://ezaiapi.com}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_API_BASE: ${OPENROUTER_API_BASE:-https://ezaiapi.com}
      # Qdrant
      QDRANT_URL: http://qdrant:6333
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: mem0_memories
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-384}
    depends_on:
      - redis
      - postgres
      - qdrant

  worker_media:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatsnp-worker-media
    restart: unless-stopped
    command: celery -A src.worker.celery_app worker -Q media_process -c 1 --loglevel=info -n media@%h --soft-time-limit=300 --time-limit=600 --max-tasks-per-child=50
    volumes:
      - media-data:/app/media # Shared với backend
      - whoosh-index:/data/whoosh_index
      - paddle-models:/root/.paddleocr
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-chatsnp}:${POSTGRES_PASSWORD:-12345678}@postgres:5432/${POSTGRES_DB:-chatsnp}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-384}
      BACKEND_INTERNAL_URL: http://backend:8000
      PYTHONUNBUFFERED: "1"
      # PaddleOCR for scanned documents (Phase 9)
      ENABLE_PADDLE_OCR: "true"
      # AI Keys for RAG
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://ezaiapi.com}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    depends_on:
      - redis
      - postgres
      - qdrant

  # ==========================================================================
  # 📊 MONITORING
  # ==========================================================================
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatsnp-flower
    restart: unless-stopped
    command: celery -A src.worker.celery_app flower --port=5555 --broker_api=redis://redis:6379/0
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

# ==========================================================================
# 💾 VOLUMES
# ==========================================================================
volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  media-data: # Shared giữa backend + worker_media (charts, audio, docs)
  whoosh-index: # BM25 lexical search index (Hybrid Search)
  paddle-models: # PaddleOCR model cache (Phase 9)
